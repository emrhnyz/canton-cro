// CRO persistent 2-participant topology (H2 file storage on participants).
//
// Why not 01-simple-topology (memory)? Live drill run 1 proved that ACS import
// is rejected on memory storage: IMPORT_ACS_ERROR "... is in memory which is
// not supported by repair. Use db persistence." (see docs/manual-baseline-run-log.md).
// H2 is the lightest Docker-free persistence (testing-only per Canton docs) and
// follows the examples/07-repair pattern. Combine with the H2 mixin:
//   canton -c <canton-dir>/config/storage/h2.conf -c localnet/cro-topology.conf ...
//
// Ports match 01-simple-topology so localnet/remote-topology.conf is unchanged.
canton {
  // Console visibility + repair-class commands for recovery flows (localnet only).
  features.enable-testing-commands = true
  features.enable-repair-commands = true

  sequencers {
    sequencer1 {
      storage.type = memory
      public-api.port = 5001
      admin-api.port = 5002
      sequencer.type = BFT
    }
  }

  mediators {
    mediator1 {
      storage.type = memory
      admin-api.port = 5202
    }
  }

  participants {
    participant1 {
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "cro_participant1"
      admin-api.port = 5012
      ledger-api.port = 5011
      http-ledger-api.port = 5013
    }
    participant2 {
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "cro_participant2"
      admin-api.port = 5022
      ledger-api.port = 5021
      http-ledger-api.port = 5023
    }
  }
}
