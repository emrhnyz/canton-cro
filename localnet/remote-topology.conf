// Remote console config for the 01-simple-topology daemon.
// Node names match the local topology so baseline console commands
// (participant1, participant2) work unchanged from a remote console.
// Ports: see vendor .../examples/01-simple-topology/simple-topology.conf
canton {
  remote-participants {
    participant1 {
      ledger-api {
        address = localhost
        address = ${?CRO_P1_LEDGER_ADDRESS}
        port = 5011
        port = ${?CRO_P1_LEDGER_PORT}
      }
      admin-api {
        address = localhost
        address = ${?CRO_P1_ADMIN_ADDRESS}
        port = 5012
        port = ${?CRO_P1_ADMIN_PORT}
      }
    }
    participant2 {
      ledger-api {
        address = localhost
        address = ${?CRO_P2_LEDGER_ADDRESS}
        port = 5021
        port = ${?CRO_P2_LEDGER_PORT}
      }
      admin-api {
        address = localhost
        address = ${?CRO_P2_ADMIN_ADDRESS}
        port = 5022
        port = ${?CRO_P2_ADMIN_PORT}
      }
    }
  }
}
